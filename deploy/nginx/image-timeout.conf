# /api/image/generate 超时配置
# 图片生成接口需要更长的超时时间，因为 AI provider 处理耗时较长
#
# 使用方法：
#   在 nginx server { } 块中 include 此文件：
#   include /etc/nginx/snippets/image-timeout.conf;
#
# 注意：
#   - 此配置仅对 /api/image/generate 生效
#   - 其他 /api/* 接口使用默认的 proxy_read_timeout
#   - 后端 provider timeout 为 120s，Nginx 需 ≥150s

location = /api/image/generate {
    proxy_pass http://127.0.0.1:8891;
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
    proxy_connect_timeout 30s;

    # 标准代理头
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
