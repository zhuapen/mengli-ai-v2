# Nginx Cache-Control Configuration for Mengli AI Platform
# Add this to your server block or include it via nginx.conf
#
# Usage:
#   1. Copy this file to /etc/nginx/snippets/cache-headers.conf on the server
#   2. Add 'include /etc/nginx/snippets/cache-headers.conf;' in your server block
#   3. Test with: sudo nginx -t
#   4. Reload: sudo systemctl reload nginx

# Vite assets with content hash - long-term cache (1 year, immutable)
location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
}

# Favicon and logo - cache for 30 days
location ~* ^/(favicon\.(ico|svg|png)|logo\.(jpg|png|svg))$ {
    expires 30d;
    add_header Cache-Control "public";
    add_header X-Content-Type-Options "nosniff" always;
}

# HTML (index.html) - no cache, always revalidate
location = / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
}

# API responses - no cache
location /api/ {
    add_header Cache-Control "no-store";
}
